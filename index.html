<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StudentBlog — Sign In</title>
  <meta name="description" content="Sign in or create an account to start writing on StudentBlog." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="container">
    <div class="brand">
      <div class="brand-logo">✍️</div>
      <div class="brand-name">StudentBlog</div>
      <div class="brand-tagline">Your ideas deserve to be heard</div>
    </div>

    <section class="card" aria-labelledby="login-heading">
      <h1 id="login-heading">Sign in to your account</h1>

      <form id="login-form" novalidate data-mode="login">
        <label for="name" class="hidden">Full name</label>
        <input id="name" name="name" type="text" autocomplete="name" placeholder="Your full name" class="hidden" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" inputmode="email" autocomplete="username"
          placeholder="you@example.com" required />

        <label for="password">Password</label>
        <div class="password-row">
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••"
            required minlength="8" />
          <button type="button" id="toggle-password" aria-pressed="false" aria-label="Show password">👁️</button>
        </div>

        <label for="confirm-password" class="hidden">Confirm password</label>
        <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password"
          placeholder="Repeat password" minlength="8" class="hidden" />

        <div class="options-row">
          <label class="checkbox">
            <input id="remember" name="remember" type="checkbox" /> Remember me
          </label>
          <a class="forgot" href="#">Forgot password?</a>
        </div>

        <div id="form-msg" role="alert" aria-live="assertive" class="hidden"></div>

        <button id="submit-btn" type="submit">Sign in</button>
      </form>

      <div class="divider"><span>OR</span></div>

      <button id="google-btn" class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Continue with Google
      </button>

      <p class="switch-mode">New here? <button id="switch-mode" type="button" class="link-button">Create an
          account</button></p>

      <div class="demo-credentials" id="demo-creds">
        <strong>Demo:</strong> use <code>user@example.com</code> / <code>Password123</code>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>

</html>
